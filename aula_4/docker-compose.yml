version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.main
      - DATABASE_URL=sqlite:///expenses.db
      - SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=True
    volumes:
      - .:/app
    working_dir: /app
    command: flask run --host 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/expenses/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
