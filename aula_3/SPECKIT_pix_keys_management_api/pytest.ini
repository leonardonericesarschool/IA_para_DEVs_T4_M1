[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=80
    --strict-markers
    -v
markers =
    unit: Unit tests
    integration: Integration tests
    contract: Contract/API tests
    slow: Slow tests
asyncio_mode = auto
