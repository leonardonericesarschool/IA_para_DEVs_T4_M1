name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy type check
        run: mypy src/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Bandit SAST
        run: bandit -r src/ -ll  # -ll = apenas medium e high severity

      - name: pip audit
        run: pip audit

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: serasa_score_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/serasa_score_test
      REDIS_URL: redis://localhost:6379/0
      SERASA_API_URL: https://api.serasa.test
      SERASA_API_KEY: test_key_for_ci_only_not_real
      SECRET_KEY: ci_secret_key_only_for_testing_purposes_not_real

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest tests/ --cov=src --cov-report=xml --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t serasa-score-api:${{ github.sha }} .

      - name: Test Docker image health
        run: |
          docker run -d --name test_container \
            -e DATABASE_URL=postgresql+asyncpg://x:x@localhost/x \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e SERASA_API_URL=https://api.serasa.test \
            -e SERASA_API_KEY=test_key \
            -e SECRET_KEY=test_secret_key_for_docker_build_check \
            -p 8000:8000 \
            serasa-score-api:${{ github.sha }} || true
          sleep 5
          docker logs test_container
          docker stop test_container || true
